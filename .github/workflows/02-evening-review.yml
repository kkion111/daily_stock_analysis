name: 收盘大盘复盘

on:
  # 定时触发 - 每天北京时间 18:00 (UTC 10:00)
  schedule:
    - cron: '0 10 * * 1-5'     # 周一到周五，UTC 10:00 = 北京时间 18:00

  # 手动触发
  workflow_dispatch:
    inputs:
      force_run:
        description: '强制运行（跳过交易日检查）'
        required: false
        default: false
        type: boolean

# 并发控制
concurrency:
  group: evening-review
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    environment: STOCK_LIST
    timeout-minutes: ${{ fromJSON(vars.ANALYSIS_TIMEOUT_MINUTES || '30') }}

    steps:
      - name: 随机延迟（避免固定时间访问）
        run: sleep $((RANDOM % 60))

      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 创建必要目录
        run: mkdir -p data logs reports

      - name: 执行收盘大盘复盘
        env:
          # AI 配置 - 小米 MIMO
          GENERATION_BACKEND: ${{ vars.GENERATION_BACKEND || secrets.GENERATION_BACKEND }}
          GENERATION_FALLBACK_BACKEND: ${{ vars.GENERATION_FALLBACK_BACKEND || secrets.GENERATION_FALLBACK_BACKEND || 'litellm' }}
          LLM_CHANNELS: ${{ vars.LLM_CHANNELS || secrets.LLM_CHANNELS }}
          LLM_MIMO_PROTOCOL: ${{ vars.LLM_MIMO_PROTOCOL || secrets.LLM_MIMO_PROTOCOL || 'openai' }}
          LLM_MIMO_BASE_URL: ${{ vars.LLM_MIMO_BASE_URL || secrets.LLM_MIMO_BASE_URL || 'https://api.xiaomimimo.com/v1' }}
          LLM_MIMO_API_KEY: ${{ secrets.LLM_MIMO_API_KEY }}
          LLM_MIMO_MODELS: ${{ vars.LLM_MIMO_MODELS || secrets.LLM_MIMO_MODELS || 'mimo-v2.5-pro' }}
          LLM_MIMO_ENABLED: ${{ vars.LLM_MIMO_ENABLED || secrets.LLM_MIMO_ENABLED || 'true' }}
          LITELLM_MODEL: ${{ vars.LITELLM_MODEL || secrets.LITELLM_MODEL }}
          LITELLM_API_KEY: ${{ secrets.LITELLM_API_KEY }}
          LITELLM_CONFIG: ${{ vars.LITELLM_CONFIG || secrets.LITELLM_CONFIG }}
          LITELLM_CONFIG_YAML: ${{ vars.LITELLM_CONFIG_YAML || secrets.LITELLM_CONFIG_YAML }}

          # 通知渠道 - 飞书
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_WEBHOOK_SECRET }}

          # 自选股
          STOCK_LIST_CONFIG: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          MARKET_REVIEW_REGION: ${{ vars.MARKET_REVIEW_REGION || secrets.MARKET_REVIEW_REGION || 'cn' }}
          MARKET_REVIEW_COLOR_SCHEME: ${{ vars.MARKET_REVIEW_COLOR_SCHEME || secrets.MARKET_REVIEW_COLOR_SCHEME || 'green_up' }}

          # 运行配置
          REPORT_TYPE: ${{ vars.REPORT_TYPE || secrets.REPORT_TYPE || 'brief' }}
          MARKET_REVIEW_ENABLED: 'true'
          SINGLE_STOCK_NOTIFY: 'false'
          TRADING_DAY_CHECK_ENABLED: ${{ vars.TRADING_DAY_CHECK_ENABLED || secrets.TRADING_DAY_CHECK_ENABLED || 'true' }}

          # 系统
          LOG_LEVEL: INFO
          MAX_WORKERS: '1'
          REALTIME_SOURCE_PRIORITY: ${{ vars.REALTIME_SOURCE_PRIORITY || 'tencent,akshare_sina,efinance,akshare_em' }}

        run: |
          if [ -n "${STOCK_LIST_CONFIG:-}" ]; then
            export STOCK_LIST="$STOCK_LIST_CONFIG"
          elif [ -z "${STOCK_LIST:-}" ]; then
            export STOCK_LIST="600519"
          fi

          if [ -n "$LITELLM_CONFIG_YAML" ] && [ -n "$LITELLM_CONFIG" ]; then
            mkdir -p "$(dirname "$LITELLM_CONFIG")"
            echo "$LITELLM_CONFIG_YAML" > "$LITELLM_CONFIG"
          fi

          FORCE_RUN_ARG=""
          if [ "${{ github.event.inputs.force_run }}" = "true" ]; then
            FORCE_RUN_ARG="--force-run"
          fi

          echo "=========================================="
          echo "📈 收盘大盘复盘"
          echo "⏰ $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          echo "🎯 自选股: $STOCK_LIST"
          echo "=========================================="

          # 收盘后跑完整分析（股票 + 大盘复盘）
          python main.py $FORCE_RUN_ARG

      - name: 上传报告
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: evening-review-${{ github.run_number }}
          path: |
            reports/
            logs/
          retention-days: 30
